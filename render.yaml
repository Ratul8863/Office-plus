services:
  - type: worker
    name: office-pulse-bot
    runtime: node
    rootDir: bot
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DISCORD_TOKEN
        sync: false
      - key: BACKEND_API_URL
        sync: false
      - key: DISCORD_CHANNEL_ID
        sync: false
      - key: LLM_ENABLED
        value: "false"
      - key: GROQ_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
